<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAM CHEUNG</title>
  <style>
    :root {
      /* Light Mode Palette */
      --bg-primary: #f4f7fb;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f8fafc;
      --bg-card: #ffffff;
      --bg-hover: #f1f5f9;
      --bg-active: #eff6ff;

      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;

      --accent-blue: #2563eb;
      --accent-cyan: #0891b2;
      --accent-violet: #7c3aed;
      --accent-emerald: #059669;
      --accent-rose: #e11d48;

      --border-color: #e2e8f0;
      --border-active: #3b82f6;

      --glow-blue: rgba(37, 99, 235, 0.15);
      --glow-violet: rgba(124, 58, 237, 0.12);

      /* Radii & Shadows */
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 9999px;

      --shadow-card: 0 10px 30px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.05);
      --shadow-glow: 0 0 40px rgba(37, 99, 235, 0.04);

      /* Transitions */
      --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    *::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.2);
      border-radius: var(--radius-full);
    }

    *::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 0.4);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(37, 99, 235, 0.06), transparent),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(124, 58, 237, 0.05), transparent),
        var(--bg-primary);
    }

    /* ─── Top Bar ─── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px) saturate(1.2);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .title-glow {
      position: relative;
      width: 12px;
      height: 12px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
      flex-shrink: 0;
    }

    .title-glow::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
      opacity: 0.25;
      filter: blur(5px);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(1.2); }
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.09em;
      background: linear-gradient(135deg, #0f172a 30%, var(--accent-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input, button, select, textarea {
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      outline: none;
      font: inherit;
      font-size: 14px;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
    }

    input:focus, textarea:focus {
      background: var(--bg-secondary);
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px var(--glow-blue);
    }

    #endpoint, #loadBtn {
      display: none !important;
    }

    #refreshBtn {
      position: relative;
      border: none;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
      color: white;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.03em;
      border-radius: var(--radius-full);
      padding: 10px 22px;
      cursor: pointer;
      overflow: hidden;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow:
        0 4px 12px rgba(37, 99, 235, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    #refreshBtn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.15));
      pointer-events: none;
    }

    #refreshBtn:hover {
      transform: translateY(-1px);
      box-shadow:
        0 6px 20px rgba(37, 99, 235, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    #refreshBtn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
    }

    /* ─── Announcement ─── */
    .announcement-wrap {
      max-width: 1440px;
      width: calc(100% - 48px);
      margin: 14px auto 0;
    }

    .announcement {
      width: 100%;
      resize: none;
      overflow: hidden;
      height: auto;

      border-radius: var(--radius-md);
      border: 1px solid rgba(37, 99, 235, 0.22);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.9), rgba(248,250,252,0.95)),
        radial-gradient(ellipse 60% 80% at 10% 0%, rgba(37,99,235,0.09), transparent);
      color: var(--text-primary);

      font-weight: 800;
      font-size: 18px;
      line-height: 1.65;
      padding: 16px 18px;

      box-shadow: var(--shadow-card), 0 0 24px rgba(37,99,235,0.06);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
    }

    .announcement:focus {
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: var(--shadow-card), 0 0 0 4px rgba(37, 99, 235, 0.10);
      transform: translateY(-1px);
    }

    /* ─── Main Layout ─── */
    .container {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 0;
      max-width: 1440px;
      width: calc(100% - 48px);
      margin: 14px auto;
      gap: 14px;
      overflow: hidden;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
      overflow: hidden;
    }

    .status {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-muted);
      background: var(--bg-tertiary);
    }

    .status.ok { color: var(--accent-emerald); }
    .status.err { color: var(--accent-rose); }

    .meta {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: rgba(248, 250, 252, 0.5);
    }

    .list {
      overflow-y: auto;
      min-height: 0;
    }

    .item {
      border-bottom: 1px solid var(--border-color);
      padding: 14px 16px;
      cursor: pointer;
      display: grid;
      gap: 8px;
      transition: background var(--transition-fast);
      position: relative;
      background: var(--bg-card);
    }

    .item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      border-radius: var(--radius-full);
      background: transparent;
      transition: background var(--transition-fast);
    }

    .item:hover { background: var(--bg-hover); }
    .item.active { background: var(--bg-active); }
    .item.active::before {
      background: linear-gradient(180deg, var(--accent-blue), var(--accent-violet));
    }

    .subject {
      font-weight: 700;
      font-size: 14px;
      line-height: 1.35;
      color: var(--text-primary);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--text-muted);
      font-size: 12px;
    }

    .time-gap {
      color: var(--accent-rose);
      font-weight: 700;
      font-size: 12px;
      background: rgba(225, 29, 72, 0.1);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
    }

    /* ─── Viewer ─── */
    .viewer {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      box-shadow: var(--shadow-card), var(--shadow-glow);
      overflow: hidden;
    }

    .mail-head {
      border-bottom: 1px solid var(--border-color);
      padding: 18px 22px;
      display: grid;
      gap: 10px;
      background: var(--bg-secondary);
    }

    .mail-head h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.35;
      color: var(--text-primary);
    }

    .mail-attrs {
      display: grid;
      gap: 4px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .preview-wrap {
      min-height: 0;
      overflow: auto;
      padding: 16px 22px 22px;
      background: var(--bg-primary);
    }

    iframe {
      width: 100%;
      min-height: 72vh;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: #ffffff;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.02);
    }

    pre {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      color: var(--text-primary);
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.65;
    }

    .empty {
      color: var(--text-muted);
      padding: 28px;
      text-align: center;
      font-size: 14px;
    }

    /* ─── Toast Notification (BIGGER + MORE ATTRACTIVE) ─── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;

      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(248,250,252,0.96)),
        radial-gradient(ellipse 80% 120% at 20% 0%, rgba(37,99,235,0.10), transparent);
      color: var(--text-primary);

      padding: 16px 22px;              /* bigger */
      border-radius: 18px;             /* bigger roundness */
      border: 1px solid rgba(37,99,235,0.18);
      border-left: 6px solid var(--accent-emerald);

      min-width: 280px;                /* makes it feel like a real toast */
      max-width: min(520px, calc(100vw - 56px));

      font-weight: 800;
      font-size: 16px;                 /* bigger text */
      letter-spacing: 0.01em;

      box-shadow:
        0 18px 45px rgba(15, 23, 42, 0.14),
        0 6px 18px rgba(15, 23, 42, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.7);

      transform: translateY(140px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(37,99,235,0.12), transparent 55%);
      opacity: 0.8;
    }

    /* ─── Responsive ─── */
    @media (max-width: 980px) {
      body { overflow: auto; }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .topbar {
        flex-wrap: wrap;
        padding: 12px 16px;
      }

      .container {
        grid-template-columns: 1fr;
        width: calc(100% - 24px);
        overflow: visible;
      }

      .announcement-wrap {
        width: calc(100% - 24px);
      }

      .sidebar { max-height: 45vh; }
      iframe { min-height: 50vh; }

      .title { font-size: 20px; }
      .announcement { font-size: 17px; }

      .toast {
        right: 16px;
        left: 16px;
        bottom: 16px;
        max-width: none;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-wrap">
        <span class="title-glow" aria-hidden="true"></span>
        <h1 class="title">SAM CHEUNG</h1>
      </div>
      <div class="controls">
        <input id="endpoint" size="70" />
        <button class="primary" id="loadBtn">Load Emails</button>
        <button id="refreshBtn">↻ Refresh</button>
      </div>
    </header>

    <div class="announcement-wrap">
      <textarea id="announcementBox" class="announcement">1. 你要手動Refresh</textarea>
    </div>

    <div class="container">
      <aside class="sidebar">
        <div id="status" class="status">Ready</div>
        <div class="meta">
          <span id="count">0 emails</span>
          <span id="lastUpdated">Never</span>
        </div>
        <div id="mailList" class="list"></div>
      </aside>

      <main class="viewer">
        <div class="mail-head">
          <h2 id="mailSubject">No email selected</h2>
          <div class="mail-attrs" id="mailAttrs"></div>
        </div>
        <div class="preview-wrap" id="preview"></div>
      </main>
    </div>
  </div>

  <div id="toast" class="toast">Refreshed successfully!</div>

  <script>
    const BASE_ENDPOINT = "https://api.testmail.app/api/json?apikey=8b791d3b-b8db-42e7-8245-590b9817a929&namespace=1zyj1&pretty=true";

    const state = {
      emails: [],
      filtered: [],
      selectedId: null
    };

    const els = {
      endpoint: document.getElementById("endpoint"),
      loadBtn: document.getElementById("loadBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      status: document.getElementById("status"),
      count: document.getElementById("count"),
      lastUpdated: document.getElementById("lastUpdated"),
      mailList: document.getElementById("mailList"),
      mailSubject: document.getElementById("mailSubject"),
      mailAttrs: document.getElementById("mailAttrs"),
      preview: document.getElementById("preview"),
      toast: document.getElementById("toast"),
      announcementBox: document.getElementById("announcementBox")
    };

    els.endpoint.value = BASE_ENDPOINT;

    // Auto-grow textarea to fit content
    function autoGrowAnnouncement() {
      const ta = els.announcementBox;
      if (!ta) return;
      ta.style.height = "auto";
      ta.style.height = Math.max(72, ta.scrollHeight) + "px";
    }

    els.announcementBox.addEventListener("input", autoGrowAnnouncement);
    window.addEventListener("load", autoGrowAnnouncement);

    // Toast logic
    let toastTimeout;
    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        els.toast.classList.remove("show");
      }, 3000);
    }

    const safe = (v) => (v === undefined || v === null) ? "" : String(v);

    function setStatus(msg, type = "") {
      els.status.className = "status" + (type ? ` ${type}` : "");
      els.status.textContent = msg;
    }

    function parseDate(email) {
      const raw =
        email.timestamp ||
        email.created_at ||
        email.date ||
        email.receivedAt ||
        email.received_at ||
        email.time ||
        null;
      if (!raw) return null;
      const dt = new Date(raw);
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function normalizeEmail(email, idx) {
      const dt = parseDate(email);
      const id =
        safe(email.id) ||
        safe(email.messageId) ||
        safe(email.message_id) ||
        safe(email._id) ||
        `idx-${idx}-${Math.random().toString(36).slice(2, 9)}`;

      const subject = email.subject || "(No Subject)";
      const html = email.html || email.htmlBody || email.html_body || email.bodyHtml || "";
      const text = email.text || email.textBody || email.text_body || email.bodyText || "";

      return {
        id,
        raw: email,
        subject: safe(subject),
        html: safe(html),
        text: safe(text),
        date: dt
      };
    }

    function sortEmails(items) {
      return [...items].sort((a, b) => {
        const at = a.date ? a.date.getTime() : 0;
        const bt = b.date ? b.date.getTime() : 0;
        return bt - at;
      });
    }

    function refreshEmailsView() {
      state.filtered = sortEmails(state.emails);
      renderList();
    }

    function isWithin30Mins(dt) {
      if (!dt) return false;
      const now = new Date();
      const diffMs = now - dt;
      const diffMins = diffMs / (1000 * 60);
      return diffMins <= 30;
    }

    function calculateTimeGap(dt) {
      if (!dt) return '';
      const now = new Date();
      const diffMs = now - dt;
      const diffMins = Math.floor(diffMs / (1000 * 60));
      return `${diffMins} min ago`;
    }

    function renderList() {
      els.mailList.innerHTML = "";
      els.count.textContent = `${state.filtered.length} email${state.filtered.length === 1 ? "" : "s"}`;

      if (!state.filtered.length) {
        els.mailList.innerHTML = `<div class="empty">No emails available in the last 24 hours.</div>`;
        renderSelected(null);
        return;
      }

      if (!state.selectedId || !state.filtered.some(e => e.id === state.selectedId)) {
        state.selectedId = state.filtered[0].id;
      }

      for (const e of state.filtered) {
        const div = document.createElement("div");
        div.className = "item" + (e.id === state.selectedId ? " active" : "");
        div.onclick = () => {
          state.selectedId = e.id;
          renderList();
          renderSelected(e);
        };

        const dateStr = e.date ? e.date.toLocaleString() : "Unknown date";
        const isRecent = isWithin30Mins(e.date);
        const timeGap = isRecent ? calculateTimeGap(e.date) : '';
        div.innerHTML = `
          <div class="subject">${escapeHtml(e.subject)}</div>
          ${isRecent ? `<div class="time-gap">${escapeHtml(timeGap)}</div>` : ''}
          <div class="row">${escapeHtml(dateStr)}</div>
        `;
        els.mailList.appendChild(div);
      }

      const selected = state.filtered.find(x => x.id === state.selectedId) || null;
      renderSelected(selected);
    }

    function renderSelected(email) {
      if (!email) {
        els.mailSubject.textContent = "No email selected";
        els.mailAttrs.innerHTML = "";
        els.preview.innerHTML = `<div class="empty">Select an email from the list to preview it.</div>`;
        return;
      }

      const dateStr = email.date ? email.date.toLocaleString() : "Unknown date";
      els.mailSubject.textContent = email.subject;
      els.mailAttrs.innerHTML = `<div><strong>Received:</strong> ${escapeHtml(dateStr)}</div>`;
      renderContent(email);
    }

    function renderContent(email) {
      if (!email) return;

      if (email.html && email.html.trim()) {
        const srcdoc = sanitizeForSrcdoc(email.html);
        els.preview.innerHTML = `<iframe sandbox="allow-popups allow-forms allow-same-origin" srcdoc="${srcdoc.replace(/"/g, "&quot;")}"></iframe>`;
      } else if (email.text && email.text.trim()) {
        els.preview.innerHTML = `<pre>${escapeHtml(email.text)}</pre>`;
      } else {
        els.preview.innerHTML = `<div class="empty">No HTML or text content available.</div>`;
      }
    }

    function sanitizeForSrcdoc(html) {
      return String(html)
        .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, "")
        .replace(/\son\w+="[^"]*"/gi, "")
        .replace(/\son\w+='[^']*'/gi, "")
        .replace(/javascript:/gi, "");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function findArrayPayload(json) {
      if (Array.isArray(json)) return json;
      const keys = ["emails", "messages", "data", "items", "results"];
      for (const k of keys) {
        if (Array.isArray(json?.[k])) return json[k];
      }
      if (json && typeof json === "object") {
        for (const k of Object.keys(json)) {
          if (Array.isArray(json[k])) return json[k];
        }
      }
      return [];
    }

    function buildEndpointWithLast1Day(baseUrl) {
      const now = Date.now();
      const oneDayAgo = now - (24 * 60 * 60 * 1000);
      const url = new URL(baseUrl);
      url.searchParams.set("timestamp_from", String(oneDayAgo));
      return url.toString();
    }

    async function loadEmails({ silent = false } = {}) {
      const baseUrl = els.endpoint.value.trim() || BASE_ENDPOINT;
      let url;
      try {
        url = buildEndpointWithLast1Day(baseUrl);
      } catch {
        setStatus("Invalid API endpoint URL.", "err");
        return;
      }

      if (!silent) setStatus("Loading emails from last 24 hours...");
      try {
        const res = await fetch(url, { headers: { "Accept": "application/json" } });
        if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);

        const json = await res.json();
        const arr = findArrayPayload(json);
        state.emails = arr.map(normalizeEmail);
        refreshEmailsView();

        els.lastUpdated.textContent = `Updated: ${new Date().toLocaleTimeString()}`;
        setStatus(`Loaded ${state.emails.length} email(s) from last 24 hours.`, "ok");

        if (silent) showToast("Refreshed successfully!");
      } catch (err) {
        console.error(err);
        setStatus(`Failed to load emails: ${err.message}`, "err");
      }
    }

    els.loadBtn.addEventListener("click", () => loadEmails());
    els.refreshBtn.addEventListener("click", () => loadEmails({ silent: true }));

    loadEmails();
  </script>
</body>
</html>
