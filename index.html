<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAM CHEUNG</title>
  <style>
    :root {
      /* Light Mode Palette (Default) */
      --bg-primary: #f4f7fb;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f8fafc;
      --bg-card: #ffffff;
      --bg-hover: #f1f5f9;
      --bg-active: #eff6ff;
      
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      
      --accent-blue: #2563eb;
      --accent-cyan: #0891b2;
      --accent-violet: #7c3aed;
      --accent-emerald: #059669;
      --accent-rose: #e11d48;
      
      --border-color: #e2e8f0;
      --border-active: #3b82f6;
      
      --glow-blue: rgba(37, 99, 235, 0.15);
      --glow-violet: rgba(124, 58, 237, 0.12);
      
      /* Radii & Shadows */
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 9999px;
      
      --shadow-card: 0 10px 30px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.05);
      --shadow-glow: 0 0 40px rgba(37, 99, 235, 0.04);
      
      /* Transitions */
      --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dark-theme {
      /* Dark Mode Palette (V2 Theme) */
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --bg-card: #1a1a2e;
      --bg-hover: #0f3460;
      --bg-active: #533483;
      
      --text-primary: #e94560;
      --text-secondary: #f39c12;
      --text-muted: #bdc3c7;
      
      --accent-blue: #3498db;
      --accent-cyan: #1abc9c;
      --accent-violet: #9b59b6;
      --accent-emerald: #2ecc71;
      --accent-rose: #e74c3c;
      
      --border-color: #34495e;
      --border-active: #3498db;
      
      --glow-blue: rgba(52, 152, 219, 0.2);
      --glow-violet: rgba(155, 89, 182, 0.18);
      
      --shadow-card: 0 12px 35px rgba(0, 0, 0, 0.3), 0 2px 4px rgba(0, 0, 0, 0.2);
      --shadow-glow: 0 0 50px rgba(52, 152, 219, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    *::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.2);
      border-radius: var(--radius-full);
    }

    *::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 0.4);
    }

    .dark-theme *::-webkit-scrollbar-thumb {
      background: rgba(189, 195, 199, 0.3);
    }

    .dark-theme *::-webkit-scrollbar-thumb:hover {
      background: rgba(189, 195, 199, 0.5);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
      transition: background var(--transition-smooth), color var(--transition-smooth);
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(37, 99, 235, 0.06), transparent),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(124, 58, 237, 0.05), transparent),
        var(--bg-primary);
      transition: background var(--transition-smooth);
    }

    .dark-theme .app {
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(52, 152, 219, 0.08), transparent),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(155, 89, 182, 0.07), transparent),
        var(--bg-primary);
    }

    /* ─── Top Bar ─── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px) saturate(1.2);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background var(--transition-smooth), border-color var(--transition-smooth);
    }

    .dark-theme .topbar {
      background: rgba(26, 26, 46, 0.9);
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .title-glow {
      position: relative;
      width: 12px;
      height: 12px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
      flex-shrink: 0;
      transition: background var(--transition-smooth);
    }

    .title-glow::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
      opacity: 0.25;
      filter: blur(5px);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .dark-theme .title-glow {
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-cyan));
    }

    .dark-theme .title-glow::before {
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-cyan));
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(1.2); }
    }

    .title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #0f172a 30%, var(--accent-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: background var(--transition-smooth);
    }

    .dark-theme .title {
      background: linear-gradient(135deg, #ffffff 0%, #3498db 50%, #e74c3c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input, button, select, textarea {
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      outline: none;
      font: inherit;
      font-size: 14px;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
    }

    input:focus, textarea:focus {
      background: var(--bg-secondary);
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px var(--glow-blue);
    }

    #endpoint, #loadBtn {
      display: none !important;
    }

    #themeToggle {
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-weight: 600;
      font-size: 13px;
      border-radius: var(--radius-full);
      padding: 8px 16px;
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
    }

    #themeToggle:hover {
      background: var(--bg-hover);
    }

    #refreshBtn {
      position: relative;
      border: none;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
      color: white;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.03em;
      border-radius: var(--radius-full);
      padding: 10px 22px;
      cursor: pointer;
      overflow: hidden;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow:
        0 4px 12px rgba(37, 99, 235, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .dark-theme #refreshBtn {
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-violet));
      box-shadow:
        0 4px 12px rgba(231, 76, 60, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    #refreshBtn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.15));
      pointer-events: none;
    }

    #refreshBtn:hover {
      transform: translateY(-1px);
      box-shadow:
        0 6px 20px rgba(37, 99, 235, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .dark-theme #refreshBtn:hover {
      box-shadow:
        0 6px 20px rgba(231, 76, 60, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    #refreshBtn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
    }

    .dark-theme #refreshBtn:active {
      box-shadow: 0 2px 8px rgba(231, 76, 60, 0.2);
    }

    /* ─── Announcement ─── */
    .announcement-wrap {
      max-width: 1440px;
      width: calc(100% - 48px);
      margin: 14px auto 0;
    }

    .announcement {
      width: 100%;
      resize: vertical;
      min-height: 72px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-primary);
      font-weight: 700;
      font-size: 16px;
      line-height: 1.5;
      padding: 14px 18px;
      box-shadow: var(--shadow-card);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    /* ─── Main Layout ─── */
    .container {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 0;
      max-width: 1440px;
      width: calc(100% - 48px);
      margin: 14px auto;
      gap: 14px;
      overflow: hidden;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
      overflow: hidden;
    }

    .status {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-muted);
      background: var(--bg-tertiary);
    }

    .status.ok {
      color: var(--accent-emerald);
    }

    .status.err {
      color: var(--accent-rose);
    }

    .meta {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: rgba(248, 250, 252, 0.5);
    }

    .dark-theme .meta {
      background: rgba(15, 52, 96, 0.6);
    }

    .list {
      overflow-y: auto;
      min-height: 0;
    }

    .item {
      border-bottom: 1px solid var(--border-color);
      padding: 14px 16px;
      cursor: pointer;
      display: grid;
      gap: 8px;
      transition: background var(--transition-fast);
      position: relative;
      background: var(--bg-card);
    }

    .item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      border-radius: var(--radius-full);
      background: transparent;
      transition: background var(--transition-fast);
    }

    .item:hover {
      background: var(--bg-hover);
    }

    .item.active {
      background: var(--bg-active);
    }

    .item.active::before {
      background: linear-gradient(180deg, var(--accent-blue), var(--accent-violet));
    }

    .dark-theme .item.active::before {
      background: linear-gradient(180deg, var(--accent-rose), var(--accent-cyan));
    }

    .subject {
      font-weight: 700;
      font-size: 14px;
      line-height: 1.35;
      color: var(--text-primary);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--text-muted);
      font-size: 12px;
    }

    .chip {
      background: rgba(37, 99, 235, 0.08);
      border: 1px solid rgba(37, 99, 235, 0.15);
      color: var(--accent-blue);
      border-radius: var(--radius-full);
      padding: 2px 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .dark-theme .chip {
      background: rgba(52, 152, 219, 0.1);
      border: 1px solid rgba(52, 152, 219, 0.2);
      color: var(--accent-blue);
    }

    /* ─── Viewer ─── */
    .viewer {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      box-shadow: var(--shadow-card), var(--shadow-glow);
      overflow: hidden;
    }

    .mail-head {
      border-bottom: 1px solid var(--border-color);
      padding: 18px 22px;
      display: grid;
      gap: 10px;
      background: var(--bg-secondary);
    }

    .mail-head h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.35;
      color: var(--text-primary);
    }

    .mail-attrs {
      display: grid;
      gap: 4px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .mail-attrs strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 10px 22px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(248, 250, 252, 0.6);
    }

    .dark-theme .tabs {
      background: rgba(15, 52, 96, 0.7);
    }

    .tab {
      border-radius: var(--radius-full);
      padding: 7px 16px;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition:
        background var(--transition-fast),
        color var(--transition-fast),
        border-color var(--transition-fast),
        box-shadow var(--transition-fast);
    }

    .tab:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .tab.active {
      border-color: rgba(37, 99, 235, 0.3);
      background: rgba(37, 99, 235, 0.08);
      color: var(--accent-blue);
      box-shadow: 0 0 12px rgba(37, 99, 235, 0.06);
    }

    .dark-theme .tab.active {
      border-color: rgba(52, 152, 219, 0.4);
      background: rgba(52, 152, 219, 0.12);
      color: var(--accent-blue);
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.08);
    }

    .preview-wrap {
      min-height: 0;
      overflow: auto;
      padding: 16px 22px 22px;
      background: var(--bg-primary);
    }

    .dark-theme .preview-wrap {
      background: #ffffff;
    }

    iframe {
      width: 100%;
      min-height: 72vh;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: #ffffff;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.02);
    }

    .dark-theme iframe {
      background: #ffffff;
    }

    pre {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      color: var(--text-primary);
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.65;
    }

    .dark-theme pre {
      background: #ffffff;
    }

    .empty {
      color: var(--text-muted);
      padding: 28px;
      text-align: center;
      font-size: 14px;
    }

    /* ─── Toast Notification ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-card);
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card), 0 5px 15px rgba(0,0,0,0.08);
      border-left: 4px solid var(--accent-emerald);
      font-weight: 600;
      font-size: 14px;
      transform: translateY(100px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
    }

    .dark-theme .toast {
      box-shadow: var(--shadow-card), 0 6px 18px rgba(0,0,0,0.15);
    }

    /* ─── Responsive ─── */
    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .topbar {
        flex-wrap: wrap;
        padding: 12px 16px;
      }

      .container {
        grid-template-columns: 1fr;
        width: calc(100% - 24px);
        overflow: visible;
      }

      .announcement-wrap {
        width: calc(100% - 24px);
      }

      .sidebar {
        max-height: 45vh;
      }

      iframe {
        min-height: 50vh;
      }

      .title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-wrap">
        <span class="title-glow" aria-hidden="true"></span>
        <h1 class="title">SAM CHEUNG</h1>
      </div>
      <div class="controls">
        <button id="themeToggle">🌙 Dark</button>
        <input id="endpoint" size="70" />
        <button class="primary" id="loadBtn">Load Emails</button>
        <button id="refreshBtn">↻ Refresh</button>
      </div>
    </header>

    <div class="announcement-wrap">
      <textarea id="announcementBox" class="announcement">1. 你要手動Refresh</textarea>
    </div>

    <div class="container">
      <aside class="sidebar">
        <div id="status" class="status">Ready</div>
        <div class="meta">
          <span id="count">0 emails</span>
          <span id="lastUpdated">Never</span>
        </div>
        <div id="mailList" class="list"></div>
      </aside>

      <main class="viewer">
        <div class="mail-head">
          <h2 id="mailSubject">No email selected</h2>
          <div class="mail-attrs" id="mailAttrs"></div>
        </div>
        <div class="tabs">
          <button class="tab active" data-tab="html">HTML Preview</button>
          <button class="tab" data-tab="text">Text</button>
          <button class="tab" data-tab="raw">Raw JSON</button>
        </div>
        <div class="preview-wrap" id="preview"></div>
      </main>
    </div>
  </div>

  <div id="toast" class="toast">Refreshed successfully!</div>

  <script>
    const BASE_ENDPOINT = "https://api.testmail.app/api/json?apikey=8b791d3b-b8db-42e7-8245-590b9817a929&namespace=1zyj1&pretty=true";

    const state = {
      emails: [],
      filtered: [],
      selectedId: null,
      tab: "html",
      isDark: false
    };

    const els = {
      endpoint: document.getElementById("endpoint"),
      loadBtn: document.getElementById("loadBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      themeToggle: document.getElementById("themeToggle"),
      status: document.getElementById("status"),
      count: document.getElementById("count"),
      lastUpdated: document.getElementById("lastUpdated"),
      mailList: document.getElementById("mailList"),
      mailSubject: document.getElementById("mailSubject"),
      mailAttrs: document.getElementById("mailAttrs"),
      preview: document.getElementById("preview"),
      tabs: [...document.querySelectorAll(".tab")],
      toast: document.getElementById("toast")
    };

    els.endpoint.value = BASE_ENDPOINT;

    // Theme toggle
    function toggleTheme() {
      state.isDark = !state.isDark;
      document.body.classList.toggle('dark-theme', state.isDark);
      els.themeToggle.textContent = state.isDark ? '☀️ Light' : '🌙 Dark';
    }

    els.themeToggle.addEventListener('click', toggleTheme);

    // Toast logic
    let toastTimeout;
    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        els.toast.classList.remove("show");
      }, 3000);
    }

    const safe = (v) => (v === undefined || v === null) ? "" : String(v);

    function setStatus(msg, type = "") {
      els.status.className = "status" + (type ? ` ${type}` : "");
      els.status.textContent = msg;
    }

    function parseDate(email) {
      const raw =
        email.timestamp ||
        email.created_at ||
        email.date ||
        email.receivedAt ||
        email.received_at ||
        email.time ||
        null;
      if (!raw) return null;
      const dt = new Date(raw);
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function normalizeEmail(email, idx) {
      const dt = parseDate(email);
      const id =
        safe(email.id) ||
        safe(email.messageId) ||
        safe(email.message_id) ||
        safe(email._id) ||
        `idx-${idx}-${Math.random().toString(36).slice(2, 9)}`;

      const from = email.from || email.fromAddress || email.sender || email.mail_from || "";
      const to = email.to || email.toAddress || email.recipient || email.mail_to || "";
      const subject = email.subject || "(No Subject)";
      const html = email.html || email.htmlBody || email.html_body || email.bodyHtml || "";
      const text = email.text || email.textBody || email.text_body || email.bodyText || "";

      return {
        id,
        raw: email,
        subject: safe(subject),
        from: safe(from),
        to: safe(to),
        html: safe(html),
        text: safe(text),
        date: dt
      };
    }

    function sortEmails(items) {
      return [...items].sort((a, b) => {
        const at = a.date ? a.date.getTime() : 0;
        const bt = b.date ? b.date.getTime() : 0;
        return bt - at;
      });
    }

    function refreshEmailsView() {
      state.filtered = sortEmails(state.emails);
      renderList();
    }

    function renderList() {
      els.mailList.innerHTML = "";
      els.count.textContent = `${state.filtered.length} email${state.filtered.length === 1 ? "" : "s"}`;

      if (!state.filtered.length) {
        els.mailList.innerHTML = `<div class="empty">No emails available in the last 24 hours.</div>`;
        renderSelected(null);
        return;
      }

      if (!state.selectedId || !state.filtered.some(e => e.id === state.selectedId)) {
        state.selectedId = state.filtered[0].id;
      }

      for (const e of state.filtered) {
        const div = document.createElement("div");
        div.className = "item" + (e.id === state.selectedId ? " active" : "");
        div.onclick = () => {
          state.selectedId = e.id;
          renderList();
          renderSelected(e);
        };

        const dateStr = e.date ? e.date.toLocaleString() : "Unknown date";
        div.innerHTML = `
          <div class="subject">${escapeHtml(e.subject)}</div>
          <div class="row">${escapeHtml(dateStr)}</div>
        `;
        els.mailList.appendChild(div);
      }

      const selected = state.filtered.find(x => x.id === state.selectedId) || null;
      renderSelected(selected);
    }

    function renderSelected(email) {
      if (!email) {
        els.mailSubject.textContent = "No email selected";
        els.mailAttrs.innerHTML = "";
        els.preview.innerHTML = `<div class="empty">Select an email from the list to preview it.</div>`;
        return;
      }

      const dateStr = email.date ? email.date.toLocaleString() : "Unknown date";
      els.mailSubject.textContent = email.subject;
      els.mailAttrs.innerHTML = `
        <div><strong>Received:</strong> ${escapeHtml(dateStr)}</div>
      `;

      renderTab(email);
    }

    function renderTab(email) {
      if (!email) return;

      for (const t of els.tabs) {
        t.classList.toggle("active", t.dataset.tab === state.tab);
      }

      if (state.tab === "html") {
        if (email.html && email.html.trim()) {
          const srcdoc = sanitizeForSrcdoc(email.html);
          els.preview.innerHTML = `<iframe sandbox="allow-popups allow-forms allow-same-origin" srcdoc="${srcdoc.replace(/"/g, "&quot;")}"></iframe>`;
        } else if (email.text && email.text.trim()) {
          els.preview.innerHTML = `<pre>${escapeHtml(email.text)}</pre>`;
        } else {
          els.preview.innerHTML = `<div class="empty">No HTML or text content available.</div>`;
        }
      } else if (state.tab === "text") {
        if (email.text && email.text.trim()) {
          els.preview.innerHTML = `<pre>${escapeHtml(email.text)}</pre>`;
        } else {
          els.preview.innerHTML = `<div class="empty">No text body available.</div>`;
        }
      } else {
        els.preview.innerHTML = `<pre>${escapeHtml(JSON.stringify(email.raw, null, 2))}</pre>`;
      }
    }

    function sanitizeForSrcdoc(html) {
      return String(html)
        .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, "")
        .replace(/\son\w+="[^"]*"/gi, "")
        .replace(/\son\w+='[^']*'/gi, "")
        .replace(/javascript:/gi, "");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function findArrayPayload(json) {
      if (Array.isArray(json)) return json;
      const keys = ["emails", "messages", "data", "items", "results"];
      for (const k of keys) {
        if (Array.isArray(json?.[k])) return json[k];
      }
      if (json && typeof json === "object") {
        for (const k of Object.keys(json)) {
          if (Array.isArray(json[k])) return json[k];
        }
      }
      return [];
    }

    function buildEndpointWithLast1Day(baseUrl) {
      const now = Date.now();
      const oneDayAgo = now - (24 * 60 * 60 * 1000);
      const url = new URL(baseUrl);
      url.searchParams.set("timestamp_from", String(oneDayAgo));
      return url.toString();
    }

    async function loadEmails({ silent = false } = {}) {
      const baseUrl = els.endpoint.value.trim() || BASE_ENDPOINT;
      let url;
      try {
        url = buildEndpointWithLast1Day(baseUrl);
      } catch {
        setStatus("Invalid API endpoint URL.", "err");
        return;
      }

      if (!silent) setStatus("Loading emails from last 24 hours...");
      try {
        const res = await fetch(url, { headers: { "Accept": "application/json" } });
        if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);

        const json = await res.json();
        const arr = findArrayPayload(json);
        state.emails = arr.map(normalizeEmail);
        refreshEmailsView();

        els.lastUpdated.textContent = `Updated: ${new Date().toLocaleTimeString()}`;
        setStatus(`Loaded ${state.emails.length} email(s) from last 24 hours.`, "ok");
        
        if (silent) {
          showToast("Refreshed successfully!");
        }
      } catch (err) {
        console.error(err);
        setStatus(`Failed to load emails: ${err.message}`, "err");
      }
    }

    els.loadBtn.addEventListener("click", () => loadEmails());
    els.refreshBtn.addEventListener("click", () => loadEmails({ silent: true }));

    for (const tab of els.tabs) {
      tab.addEventListener("click", () => {
        state.tab = tab.dataset.tab;
        const selected = state.filtered.find(x => x.id === state.selectedId) || null;
        renderTab(selected);
      });
    }

    loadEmails();
  </script>
</body>
</html>
